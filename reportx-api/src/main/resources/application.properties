spring.application.name=reportx-api

server.port=8080

# Change these 5 values to match your MySQL setup
db.host=127.0.0.1
db.port=3306
db.name=reportx
db.username=root
db.password=password

# Do not touch this line
spring.datasource.url=jdbc:mysql://${db.host}:${db.port}/${db.name}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${db.username}
spring.datasource.password=${db.password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# REQUIRED: Change this to a random 64+ character string
reportx.jwt.secret=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_KEY_MINIMUM_64_CHARACTERS
reportx.jwt.ttl-minutes=30

# How often (in minutes) to delete expired web tokens from the database
reportx.token.cleanup-interval-minutes=60

# The URL where your web dashboard is hosted
# Multiple URLs separated by comma: http://localhost:5173,https://yourdomain.com
reportx.cors.allowed-origins=http://localhost:5173

server.error.include-stacktrace=never
server.error.include-message=never

# ── Rate Limiting ───────────────────────────────────────────────────
# Max requests per token (or IP) within the window
reportx.ratelimit.requests-per-window=100
# Sliding window size in seconds
reportx.ratelimit.window-seconds=60

# ── Plugin notification polling ─────────────────────────────────────
# This secret must match `web-dashboard.plugin-secret` in the plugin's config.yml
# Change this to a long random string!
reportx.plugin.secret=CHANGE_THIS_PLUGIN_SECRET
